schema_version: 1

context:
  version: "0.10.1"

package:
  name: fps-login
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-login/fps_login-${{ version }}.tar.gz
    sha256: e22fc4dba8d38b56fce1c92f6d5f3f6d76969f368293de65afc62c4f01ceaabe

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - fastapi-core
    - fps
    - jupyverse-api >=0.15.0,<0.16.0
    - jupyverse-auth >=0.2.0,<0.3.0
    - jupyverse-login >=0.1.0,<0.2.0

tests:
  - python:
      imports: fps_login
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/login
  summary: An FPS plugin for the login API

extra:
  recipe-maintainers:
    - davidbrochart
