schema_version: 1

context:
  version: "0.9.7"

package:
  name: fps-login
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-login/fps_login-${{ version }}.tar.gz
    sha256: a1ffc4c292932d8394118cd4efca650fad398824e924c7fc3d6b1a0495693ebe

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - jupyverse-api >=0.14.0,<0.15.0

tests:
  - python:
      imports: fps_login
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/login
  summary: An FPS plugin for the login API

extra:
  recipe-maintainers:
    - davidbrochart
